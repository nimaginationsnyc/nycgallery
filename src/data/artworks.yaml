# ─────────────────────────────────────────────────────────
# ARTWORKS
#
# To add a new piece:
#  1. Upload the image file to public/images/ on GitHub
#  2. Copy one of the entries below and fill in your details
#  3. Commit the change — the site rebuilds automatically
#
# Fields:
#   title     — name of the piece (required)
#   image     — filename inside public/images/ (required)
#   medium    — e.g. "Oil on canvas", "Watercolor on paper"
#   size      — dimensions, e.g. "24 × 36 in"
#   year      — year completed
#   available — true if for sale, false if sold or NFS
#   featured  — true to pin this piece to the top of the gallery
# ─────────────────────────────────────────────────────────

